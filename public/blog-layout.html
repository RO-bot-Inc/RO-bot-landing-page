
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - RO-bot Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <link href="/style.css" rel="stylesheet">
    <link href="/shared-nav.css" rel="stylesheet">
    <link rel="icon" href="/browser.svg" type="image/svg+xml">
    <style>
        /* Blog-specific styles */
        .blog-content {
            max-width: 4rem;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .blog-header {
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .blog-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0F1108;
            margin-bottom: 1rem;
        }
        
        .blog-meta {
            color: #6B7280;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        
        .blog-body {
            prose prose-lg max-width: none;
            line-height: 1.8;
            color: #374151;
        }
        
        .blog-body h2 {
            font-size: 1.875rem;
            font-weight: 600;
            color: #0F1108;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        
        .blog-body h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0F1108;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
        
        .blog-body p {
            margin-bottom: 1.5rem;
        }
        
        .blog-body ul, .blog-body ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }
        
        .blog-body li {
            margin-bottom: 0.5rem;
        }
        
        @media (min-width: 768px) {
            .blog-content {
                max-width: 48rem;
                padding: 3rem 2rem;
            }
            
            .blog-title {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body class="bg-white font-sans text-brand-dark antialiased">
    <!-- Include Shared Navigation -->
    <nav class="sticky top-0 z-50 bg-white shadow-sm backdrop-blur-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 sm:h-20">
                <!-- Logo (Left Side) -->
                <div class="flex-shrink-0">
                    <a href="/" title="RO-bot Home">
                        <img class="h-12 sm:h-14 w-auto" src="/Color logo - no background.svg" alt="RO-bot Logo">
                    </a>
                </div>
                
                <!-- Login and Join Waitlist Buttons + Hamburger Menu (Right Side) -->
                <div class="flex items-center space-x-6">
                    <a href="/#waitlist-form" data-smooth-scroll
                       class="bg-brand-orange text-white hover:bg-white hover:text-brand-orange border-2 border-brand-orange font-medium px-4 py-2 rounded-md text-sm transition duration-150 ease-in-out">
                        Book Demo
                    </a>
                    <a href="https://app.ro-bot.io" target="_blank" rel="noopener noreferrer"
                       class="bg-brand-green text-white hover:bg-white hover:text-brand-green border-2 border-brand-green font-medium px-4 py-2 rounded-md text-sm transition duration-150 ease-in-out">
                        Login
                    </a>
                    
                    <!-- Hamburger Menu Button -->
                    <button id="hamburger-btn" class="hamburger-menu-btn" aria-label="Open menu">
                        <div class="hamburger-line"></div>
                        <div class="hamburger-line"></div>
                        <div class="hamburger-line"></div>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hamburger Menu Overlay -->
    <div id="hamburger-overlay" class="hamburger-overlay">
        <div class="hamburger-menu">
            <div class="hamburger-header">
                <img class="h-10 w-auto" src="/Color logo - no background.svg" alt="RO-bot Logo">
                <button id="hamburger-close" class="hamburger-close-btn" aria-label="Close menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <nav class="hamburger-nav">
                <a href="/book-demo" class="hamburger-nav-item">
                    <span class="hamburger-nav-icon">📅</span>
                    Book a Demo
                </a>
                <a href="/about" class="hamburger-nav-item">
                    <span class="hamburger-nav-icon">ℹ️</span>
                    About
                </a>
                <a href="/blog" class="hamburger-nav-item">
                    <span class="hamburger-nav-icon">📝</span>
                    Blog
                </a>
                <a href="/support" class="hamburger-nav-item">
                    <span class="hamburger-nav-icon">🔧</span>
                    Support
                </a>
            </nav>
        </div>
    </div>

    <main>
        <!-- Blog Content -->
        <div class="blog-content">
            <div class="blog-header">
                <h1 class="blog-title">{{TITLE}}</h1>
                <div class="blog-meta">{{META}}</div>
            </div>
            <div class="blog-body">
                {{CONTENT}}
            </div>
        </div>
    </main>

    <script src="/shared-nav.js"></script>
</body>
</html>
