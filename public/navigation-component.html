
<style>
/* Brand colors for navigation */
.text-brand-orange {
    color: #C63006;
}

.text-brand-green {
    color: #2a9d8f;
}

.hover\:text-brand-orange:hover {
    color: #C63006;
}

.hover\:text-brand-green:hover {
    color: #2a9d8f;
}

.bg-brand-orange {
    background-color: #C63006;
}

.border-brand-orange {
    border-color: #C63006;
}

.hover\:bg-brand-orange:hover {
    background-color: #C63006;
}

/* CSS Grid Navigation Layout */
.nav-grid {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: end;
    height: 5rem;
    padding-bottom: 1rem;
    position: relative;
}

/* Visual reference line for alignment */
.nav-grid::after {
    content: '';
    position: absolute;
    bottom: 1rem;
    left: 0;
    right: 0;
    height: 1px;
    background: red;
    z-index: 100;
}

.nav-links {
    display: flex;
    align-items: baseline;
    gap: 2rem;
    justify-content: flex-end;
    margin-right: 2rem;
}

.nav-actions {
    display: flex;
    align-items: baseline;
    gap: 1rem;
}

/* Text baseline adjustment - nav links sit exactly on red line */
.nav-links a, .nav-actions a:not(.book-demo-btn) {
    line-height: 1;
    display: inline-block;
    padding-bottom: 1px; /* Fine-tune to sit on red line */
}

/* Logo container aligned to baseline */
.logo-container {
    display: flex;
    align-items: flex-end;
    padding-bottom: 2px; /* Reduced to move logo down to red line */
}

/* Adjust button to align text baseline with links */
.book-demo-btn {
    display: inline-flex;
    align-items: center;
    padding: 0.325rem 1.25rem; /* Reduce padding slightly */
    line-height: 1;
    border: 2px solid #C63006;
    font-medium: true;
    font-size: 0.875rem;
    border-radius: 0.375rem;
    transition: all 0.15s ease-in-out;
    transform: translateY(2px); /* Move down to touch red line */
}

/* Mobile navigation fixes */
@media (max-width: 640px) {
    /* Prevent Book Demo button text wrapping on mobile */
    .bg-brand-orange {
        font-size: 12px !important;
        padding: 8px 12px !important;
        white-space: nowrap !important;
    }

    /* Fix mobile navigation spacing and alignment */
    nav .max-w-7xl {
        padding-left: 1rem !important;
        padding-right: 0.75rem !important;
    }
}

/* Small mobile screens - additional fixes */
@media (max-width: 480px) {
    nav .max-w-7xl {
        padding-left: 0.75rem !important;
        padding-right: 0.5rem !important;
    }
}

/* Force gap between navigation buttons */
nav a[href*="waitlist-form"] {
    margin-right: 12px !important;
}
</style>

<!-- Canonical Navigation Component - Alpine.js powered -->
<nav class="sticky top-0 z-50 bg-white shadow-sm backdrop-blur-sm" x-data="{ mobileMenuOpen: false }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="nav-grid">
            <!-- Logo -->
            <div class="logo-container">
                <a href="/" title="RO-bot Home" class="flex items-center">
                    <img class="h-12 sm:h-14 w-auto" src="/Color logo - no background.svg" alt="RO-bot Logo">
                </a>
            </div>
            
            <!-- Center nav links -->
            <div class="nav-links hidden md:flex">
                <a href="/about" class="text-gray-700 hover:text-brand-green transition-colors">About</a>
                <a href="/blog" class="text-gray-700 hover:text-brand-green transition-colors">Blog</a>
                <a href="/support" class="text-gray-700 hover:text-brand-green transition-colors">Support</a>
            </div>
            
            <!-- Right side actions -->
            <div class="nav-actions hidden md:flex">
                <a href="https://app.ro-bot.io" target="_blank" rel="noopener noreferrer" class="text-gray-700 hover:text-brand-green transition-colors">Login</a>
                <a href="/#waitlist-form" class="book-demo-btn bg-white text-brand-orange hover:bg-brand-orange hover:text-white">Book Demo</a>
            </div>
            
            <!-- Mobile menu button -->
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden flex items-center p-2 rounded-md hover:bg-gray-100 focus:outline-none">
                <svg x-show="!mobileMenuOpen" class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
                <svg x-show="mobileMenuOpen" class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Mobile menu (full screen overlay) -->
    <div x-show="mobileMenuOpen" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click.away="mobileMenuOpen = false"
         @keydown.escape.window="mobileMenuOpen = false"
         class="fixed inset-0 bg-white z-50 md:hidden">
        
        <!-- Mobile menu header -->
        <div class="flex items-center justify-between p-4 border-b">
            <div class="flex-shrink-0">
                <a href="/" title="RO-bot Home">
                    <img class="h-12 w-auto" src="/Color logo - no background.svg" alt="RO-bot Logo">
                </a>
            </div>
            <button @click="mobileMenuOpen = false" class="p-2 rounded-md hover:bg-gray-100">
                <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        
        <!-- Mobile menu links -->
        <div class="px-4 py-6 space-y-4">
            <a href="/about" @click="mobileMenuOpen = false" class="block text-lg text-gray-900 hover:text-brand-green py-2 transition duration-150 ease-in-out">About</a>
            <a href="/blog" @click="mobileMenuOpen = false" class="block text-lg text-gray-900 hover:text-brand-green py-2 transition duration-150 ease-in-out">Blog</a>
            <a href="/support" @click="mobileMenuOpen = false" class="block text-lg text-gray-900 hover:text-brand-green py-2 transition duration-150 ease-in-out">Support</a>
            <a href="/#waitlist-form" @click="mobileMenuOpen = false" class="block bg-brand-orange text-white text-center py-3 rounded-md hover:bg-opacity-90 transition duration-150 ease-in-out">Book Demo</a>
            <a href="https://app.ro-bot.io" target="_blank" rel="noopener noreferrer" @click="mobileMenuOpen = false" class="block text-lg text-gray-900 hover:text-brand-green py-2 text-center transition duration-150 ease-in-out">Login</a>
        </div>
    </div>
</nav>
