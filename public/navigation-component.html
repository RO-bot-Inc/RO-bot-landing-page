<!-- Canonical Navigation Component - Alpine.js powered -->
<div x-data="{ mobileMenuOpen: false }">
    <!-- Navigation Bar -->
    <nav class="sticky top-0 z-50 bg-white shadow-sm backdrop-blur-sm">
        <div class="nav-grid">
            <!-- Logo -->
            <div class="logo-container">
                <a href="/" title="RO-bot Home" class="flex items-center">
                    <img class="h-12 sm:h-14 w-auto" src="/Color logo - no background.svg" alt="RO-bot Logo">
                </a>
            </div>

            <!-- Desktop Navigation -->
            <div class="nav-links-container hidden md:flex">
                <a href="/about" class="text-gray-700 hover:text-brand-green transition-colors">About</a>
                <a href="/blog" class="text-gray-700 hover:text-brand-green transition-colors">Blog</a>
                <a href="/support" class="text-gray-700 hover:text-brand-green transition-colors">Support</a>
                <a href="https://app.ro-bot.io" target="_blank" rel="noopener noreferrer" class="text-gray-700 hover:text-brand-green transition-colors ml-8">Login</a>
                <a href="/#waitlist-form" class="book-demo-btn bg-white text-brand-orange hover:bg-brand-orange hover:text-white border-2 border-brand-orange font-medium">Book Demo</a>
            </div>

            <!-- Mobile menu button -->
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden flex items-center p-2 rounded-md hover:bg-gray-100 focus:outline-none">
                <svg x-show="!mobileMenuOpen" class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
                <svg x-show="mobileMenuOpen" class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </nav>

   <!-- Mobile menu (full screen overlay) -->
<div x-show="mobileMenuOpen" 
     x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     @click.away="mobileMenuOpen = false"
     @keydown.escape.window="mobileMenuOpen = false"
     class="fixed inset-0 bg-white z-[9999] md:hidden overflow-y-auto flex flex-col"
     style="z-index: 999999;">

    <!-- Mobile menu header -->
    <div class="flex items-center justify-between p-6">
        <div class="flex-shrink-0">
            <a href="/" title="RO-bot Home">
                <img class="h-12 w-auto" src="/Color logo - no background.svg" alt="RO-bot Logo">
            </a>
        </div>
        <button @click="mobileMenuOpen = false" class="p-2 -mr-2 rounded-md hover:bg-gray-100">
            <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <!-- Mobile menu links with flex-grow to push button to bottom -->
    <div class="flex-grow px-6 flex items-center">
        <div class="w-full">
            <div class="divide-y divide-gray-200 border-t border-b border-gray-200">
                <a href="/about" @click="mobileMenuOpen = false" class="block py-5 text-xl text-gray-900 hover:text-brand-green transition-colors text-center">About</a>
                <a href="/blog" @click="mobileMenuOpen = false" class="block py-5 text-xl text-gray-900 hover:text-brand-green transition-colors text-center">Blog</a>
                <a href="/support" @click="mobileMenuOpen = false" class="block py-5 text-xl text-gray-900 hover:text-brand-green transition-colors text-center">Support</a>
                <a href="https://app.ro-bot.io" target="_blank" rel="noopener noreferrer" @click="mobileMenuOpen = false" class="block py-5 text-xl text-gray-900 hover:text-brand-green transition-colors text-center">Login</a>
            </div>
        </div>
    </div>

    <!-- Book Demo button at bottom -->
    <div class="p-6 text-center">
        <a href="/#waitlist-form" @click="mobileMenuOpen = false" class="inline-block bg-brand-orange text-white px-6 py-3 rounded-md text-lg font-medium hover:bg-opacity-90 transition-all">Book Demo</a>
    </div>
