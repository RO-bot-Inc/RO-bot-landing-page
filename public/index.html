<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="Android.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="out.css">
  <title>RO-bot: AI for Automotive Technicians</title>
  <style>
    /* Responsive video scaling to match container breakpoints */
    .hero-video {
      transform: scale(1.1);
    }

    @media (min-width: 640px) {
      .hero-video {
        transform: scale(1.08);
      }
    }

    @media (min-width: 768px) {
      .hero-video {
        transform: scale(1.06);
      }
    }

    @media (min-width: 1024px) {
      .hero-video {
        transform: scale(1.04);
      }
    }

    @media (min-width: 1280px) {
      .hero-video {
        transform: scale(1.02);
      }
    }
  </style>
</head>
<body class="bg-white flex justify-center">
  <div class="max-w-5xl pt-20 lg:pt-32 mx-2">
    <div class="bg-white">
      <section class="pb-16">
        <div class="text-center relative overflow-visible">
          <div class="relative">
            <img src="/hero/keyboard-tools.png" alt="Automotive tools and keyboard with mechanics working on a car" class="w-full h-[80vh] object-cover">
            <div class="absolute inset-0" style="background-color: rgba(42, 157, 143, 0.5)"></div>
            <div class="absolute inset-0 flex flex-col items-center">
              <div class="container mx-auto px-4 flex flex-col items-center">
                <div class="pt-10 mb-8 z-10 w-full">
                  <h1 class="font-montserrat text-4xl sm:text-5xl lg:text-6xl font-bold text-white tracking-tight leading-tight sm:leading-tight lg:leading-tight text-center" style="text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8)">
                    Voice notes to complete repair story in under 5 seconds.
                  </h1>
                </div>
              </div>
            </div>
          </div>

          <!-- Three-element hero section -->
          <div class="container mx-auto px-4 relative z-20">
            <div class="w-full md:w-[95%] relative mx-auto -mt-48 sm:-mt-60 md:-mt-80">
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 items-start">
                <!-- Record Video (Left) - moved up 10px -->
                <div class="relative aspect-[10/19] w-[85%] sm:w-[75%] md:w-[90%] lg:w-[85%] xl:w-[80%] max-w-xs mx-auto p-3 rounded-[3rem] overflow-hidden flex items-center justify-center" style="transform: translateY(-10px);">
                  <video autoplay loop muted playsinline class="w-full h-full object-cover rounded-[3rem] hero-video" style="object-position: center center;" alt="Voice notes interface showing diagnostic process">
                    <source src="/hero/record%20note.mov" type="video/mp4">
                    <source src="/hero/record note.mov" type="video/quicktime">
                    Your browser does not support the video tag.
                  </video>
                </div>

                <!-- Arrows (Center) - moved left 10px -->
                <div class="flex justify-center items-center mt-[30%]" style="transform: translateX(-10px);">
                  <img src="/hero/arrows.png" alt="Process flow arrows" class="w-[60%] md:w-[70%] scroll-spin"/>
                </div>

                <!-- Update Video (Right) - moved down 20px -->
                <div class="relative aspect-[10/19] w-[85%] sm:w-[75%] md:w-[90%] lg:w-[85%] xl:w-[80%] max-w-xs mx-auto p-3 rounded-[3rem] overflow-hidden flex items-center justify-center mt-[20%]" style="transform: translateY(20px);">
                  <video muted playsinline class="w-full h-full object-cover rounded-[3rem] hero-video" style="object-position: center center;" alt="Generated repair story with detailed documentation">
                    <source src="/hero/update story.mov" type="video/mp4">
                    Your browser does not support the video tag.
                  </video>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
