
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Second Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a; /* Dark background */
            color: #e0e0e0; /* Light text */
        }
        .timer-container {
            text-align: center;
            padding: 0px 20px;
            border-radius: 15px;
            background-color: #2c2c2c; /* Slightly lighter card background */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            min-width: 200px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #timerDisplay {
            font-size: 3rem; /* Reduced from 5rem to prevent cropping */
            font-weight: bold;
            color: #4ade80; /* Green accent for timer */
            letter-spacing: 1px;
            line-height: 1;
            white-space: nowrap;
            overflow: visible;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            #timerDisplay {
                font-size: 2.5rem;
            }
            .timer-container {
                padding: 0px 15px;
                min-height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="timer-container">
        <div id="timerDisplay">5.000</div>
    </div>

    <script>
        // --- Timer Logic ---
        const timerDisplay = document.getElementById('timerDisplay');
        let timeLeft = 5.000; // Initial time in seconds
        let timerInterval;
        let isRunning = false;

        // Function to format time to three decimal places
        function formatTime(seconds) {
            return Math.max(0, seconds).toFixed(3);
        }

        // Function to update the timer display
        function updateTimer() {
            timerDisplay.textContent = formatTime(timeLeft);
        }

        // Function to start the countdown
        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            timeLeft = 5.000;
            updateTimer();

            const startTime = performance.now();

            timerInterval = setInterval(() => {
                // Only update if still running
                if (!isRunning) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    return;
                }
                
                const elapsedTime = (performance.now() - startTime) / 1000;
                timeLeft = 5.000 - elapsedTime;

                if (timeLeft <= 1.676) {
                    timeLeft = 1.676;
                    stopTimer();
                    return;
                }
                updateTimer();
            }, 1); // Update every millisecond for smooth decimal display
        }

        // Function to stop the timer
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            isRunning = false;
            // Freeze the current time when stopped
            updateTimer();
            
            // Notify parent window that timer has stopped
            if (window.parent) {
                window.parent.postMessage('timerStopped', '*');
            }
        }

        // Function to reset the timer
        function resetTimer() {
            stopTimer();
            timeLeft = 5.000;
            updateTimer();
        }

        // Listen for messages from parent window to control timer
        window.addEventListener('message', function(event) {
            if (event.data === 'startTimer') {
                startTimer();
            } else if (event.data === 'stopTimer') {
                stopTimer();
            } else if (event.data === 'resetTimer') {
                resetTimer();
            }
        });

        // Initialize timer display
        updateTimer();
    </script>
</body>
</html>
