
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Demo - RO-bot</title>
    <link href="style.css" rel="stylesheet">
    <link href="shared-nav.css" rel="stylesheet">
</head>
<body class="bg-white font-sans text-brand-dark antialiased">
    <!-- Universal Navigation -->
    <div id="navigation-container"></div>
    
    <script>
        // Load shared navigation
        fetch('/shared-nav.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navigation-container').innerHTML = html;
                
                // Load navigation JavaScript after HTML is inserted
                const script = document.createElement('script');
                script.src = '/shared-nav.js';
                document.head.appendChild(script);
            })
            .catch(error => console.error('Error loading navigation:', error));
    </script>

    <main>
        <section class="py-16 sm:py-24">
            <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                <h1 class="text-3xl sm:text-4xl font-montserrat font-bold text-brand-dark mb-6">Book Your RO-bot Demo</h1>
                <p class="text-lg text-brand-dark opacity-90 leading-relaxed mb-10">
                    See how RO-bot can transform your service operations with AI-powered assistance.
                </p>

                <div class="max-w-md mx-auto">
                    <form action="https://formspree.io/f/mrbqydnq" method="POST" class="space-y-4">
                        <input type="hidden" name="_subject" value="Demo Request">
                        <input type="hidden" name="_next" value="https://ro-bot.io/thank-you">

                        <div>
                            <input type="text" name="name" placeholder="Your Name" required
                                   class="w-full px-4 py-3 rounded-lg text-brand-dark bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-orange focus:border-transparent">
                        </div>

                        <div>
                            <input type="email" name="email" placeholder="Your Email" required
                                   class="w-full px-4 py-3 rounded-lg text-brand-dark bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-orange focus:border-transparent">
                        </div>

                        <div>
                            <input type="text" name="shop" placeholder="Shop/Dealership Name" 
                                   class="w-full px-4 py-3 rounded-lg text-brand-dark bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-orange focus:border-transparent">
                        </div>

                        <button type="submit" 
                                class="w-full bg-brand-orange text-white hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-orange font-semibold px-8 py-3 rounded-lg text-lg transition duration-150 ease-in-out shadow-lg transform hover:scale-105 mb-6">
                            Book Demo
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="shared-nav.js"></script>
    <script>
        // Load universal navigation
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/shared-nav.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('universal-nav').innerHTML = html;
                });
        });
    </script>
</body>
</html>
