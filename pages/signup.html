<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RO-bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <link href="/style.css" rel="stylesheet">
    <link href="/shared-nav.css" rel="stylesheet">
    <link rel="icon" href="/browser.svg" type="image/svg+xml">
    <script src="/shared-nav.js"></script>
    <script src="/script.js"></script>
</head>
<body class="bg-brand-light font-sans text-brand-dark antialiased">
    <script>
        // Load universal navigation
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/shared-nav.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('universal-nav').innerHTML = html;
                });
        });
    </script>
    <!-- Universal Navigation -->
    <div id="navigation-container"></div>
    
    <script>
        // Load shared navigation
        fetch('/shared-nav.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navigation-container').innerHTML = html;
                
                // Load navigation JavaScript after HTML is inserted
                const script = document.createElement('script');
                script.src = '/shared-nav.js';
                document.head.appendChild(script);
            })
            .catch(error => console.error('Error loading navigation:', error));
    </script>

    <main>
        <section class="py-16 sm:py-24">
            <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                <h2 class="text-3xl sm:text-4xl font-montserrat font-bold text-brand-dark tracking-tight">
                    Sign up for RO-bot
                </h2>

                <p class="mt-4 text-lg text-brand-dark opacity-90 leading-relaxed">
                    Join us to see how RO-bot can supercharge your service lane and streamline warranty claims.
                </p>

                <form action="https://formspree.io/f/mrbqydnq" method="POST" class="mt-10 max-w-lg mx-auto text-left">
                    <div class="grid grid-cols-1 gap-y-6">
                        <div>
                            <label for="full-name" class="block text-sm font-medium text-brand-dark opacity-90">Full Name</label>
                            <div class="mt-1">
                                <input type="text" name="full-name" id="full-name" autocomplete="name" required
                                       class="block w-full px-4 py-3 border border-brand-silver rounded-md shadow-sm placeholder-brand-silver focus:outline-none focus:ring-1 focus:ring-brand-orange focus:border-brand-orange sm:text-sm">
                            </div>
                        </div>

                        <div>
                            <label for="email" class="block text-sm font-medium text-brand-dark opacity-90">Work Email</label>
                            <div class="mt-1">
                                <input id="email" name="email" type="email" autocomplete="email" required
                                       class="block w-full px-4 py-3 border border-brand-silver rounded-md shadow-sm placeholder-brand-silver focus:outline-none focus:ring-1 focus:ring-brand-orange focus:border-brand-orange sm:text-sm">
                            </div>
                        </div>

                        <div>
                            <label for="dealership" class="block text-sm font-medium text-brand-dark opacity-90">Dealership Name</label>
                            <div class="mt-1">
                                <input type="text" name="dealership" id="dealership" autocomplete="organization" required
                                       class="block w-full px-4 py-3 border border-brand-silver rounded-md shadow-sm placeholder-brand-silver focus:outline-none focus:ring-1 focus:ring-brand-orange focus:border-brand-orange sm:text-sm">
                            </div>
                        </div>

                        <div>
                            <label for="role" class="block text-sm font-medium text-brand-dark opacity-90">Your Role</label>
                            <div class="mt-1">
                                <select id="role" name="role" required
                                        class="block w-full px-4 py-3 border border-brand-silver rounded-md shadow-sm bg-white focus:outline-none focus:ring-1 focus:ring-brand-orange focus:border-brand-orange sm:text-sm text-brand-dark opacity-90">
                                    <option value="" disabled selected>Select your role...</option>
                                    <option value="Technician">Technician</option>
                                    <option value="Service Advisor">Service Advisor</option>
                                    <option value="Service Manager">Service Manager</option>
                                    <option value="Warranty Administrator">Warranty Administrator</option>
                                    <option value="Fixed Ops Director">Fixed Ops Director</option>
                                    <option value="Owner/GM">Owner/GM</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label for="challenge" class="block text-sm font-medium text-brand-dark opacity-90">What do you hope RO-bot can do for you / your dealership? <span class="text-brand-silver font-normal">(Optional)</span></label>
                            <div class="mt-1">
                                <textarea id="challenge" name="challenge" rows="4"
                                          class="block w-full px-4 py-3 border border-brand-silver rounded-md shadow-sm placeholder-brand-silver focus:outline-none focus:ring-1 focus:ring-brand-orange focus:border-brand-orange sm:text-sm"></textarea>
                            </div>
                        </div>

                        <div class="text-center pt-2">
                            <button type="submit"
                                    class="inline-flex justify-center py-3 px-8 border border-transparent shadow-lg text-lg font-semibold rounded-lg text-white bg-brand-orange hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-orange focus:ring-offset-brand-light transition duration-150 ease-in-out transform hover:scale-105">
                                Sign Up
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
